<style>

  *{ margin:0; padding:0; box-sizing:border-box; }

  .wrap{ max-width: 1080px; margin:0 auto; padding: 0 22px; }

  header{ position: sticky; top:0; z-index: 20; background: rgba(255,255,255,0.88); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }

  .brand{ display:flex; align-items:center; gap:10px; }
  .brand img{ height:38px; width:auto; }
  .brand-tabs{ display:flex; gap:8px; font-family:'IBM Plex Mono', monospace; font-size:0.78rem; overflow-x:auto; scrollbar-width:none; max-width:100%; }
  .brand-tabs::-webkit-scrollbar{ display:none; }
  .brand-tabs a{ flex-shrink:0; padding: 6px 14px; border-radius: 20px; color: var(--text-dim); border: 1px solid var(--line); transition: all .15s ease; }
  .brand-tabs a.active{ background: var(--orange); color:#fff; border-color: var(--orange); }
  .brand-tabs a:hover:not(.active){ border-color: var(--orange); color: var(--orange-2); }
  .call-btn{ background: var(--orange); color:#fff; font-weight:700; font-size:0.85rem; padding: 9px 18px; border-radius: 30px; font-family:'IBM Plex Mono', monospace; transition: transform .15s ease, box-shadow .15s ease; }
  .call-btn:hover{ transform: translateY(-1px); box-shadow: 0 8px 22px -8px var(--orange-glow); }

  .back-link{ display:inline-block; margin: 26px 0 6px; font-family:'IBM Plex Mono', monospace; font-size:0.82rem; color: var(--orange-2); }

  .product-top{ display:flex; gap:32px; flex-wrap:wrap; padding: 20px 0 30px; align-items:flex-start; }
  .product-media{ flex:1 1 260px; display:flex; justify-content:center; }
  .product-media .frame{
    width:100%; max-width:280px; aspect-ratio:1/1; border-radius:20px;
    background: radial-gradient(circle at 30% 20%, rgba(255,106,26,0.16), rgba(255,106,26,0.03));
    border: 1px solid var(--line);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .product-media .frame img{ width:100%; height:100%; object-fit:contain; }
  .product-media .frame .icon{ width:90px; height:90px; color: var(--orange-2); }

  .product-info{ flex:1 1 320px; }
  .product-info .cat{ font-family:'IBM Plex Mono', monospace; font-size:0.78rem; color: var(--orange-2); border:1px solid rgba(217,84,15,0.3); padding:3px 12px; border-radius:20px; display:inline-block; margin-bottom:14px; }
  .product-info h1{ font-size: clamp(1.6rem, 4.5vw, 2.2rem); font-weight:900; margin-bottom:10px; }
  .product-info .price-tag{ font-family:'IBM Plex Mono', monospace; color: var(--text-dim); font-size:0.95rem; margin-bottom:22px; }
  .product-info .actions{ display:flex; gap:12px; flex-wrap:wrap; }
  .btn-primary{ background: var(--orange); color:#fff; font-weight:800; padding: 13px 26px; border-radius: 10px; font-size:0.92rem; transition: transform .15s ease; }
  .btn-primary:hover{ transform: translateY(-2px); }
  .btn-ghost{ border:1px solid var(--line); color:var(--text); padding: 13px 26px; border-radius:10px; font-size:0.92rem; transition: border-color .15s ease; }
  .btn-ghost:hover{ border-color: var(--orange); }

  .specs-section{ padding: 20px 0 60px; }
  .specs-section h2{ font-size:1.15rem; font-weight:800; color: var(--orange-2); margin-bottom:16px; }
  .specs-table{ background: var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  .specs-row{ display:flex; padding:14px 20px; border-bottom:1px solid var(--line); font-size:0.92rem; }
  .specs-row:last-child{ border-bottom:none; }
  .specs-row .k{ width:120px; flex-shrink:0; color: var(--text-dim); font-family:'IBM Plex Mono', monospace; font-size:0.8rem; }
  .specs-row .v{ flex:1; font-weight:600; }

  .not-found{ padding:80px 0; text-align:center; color: var(--text-dim); }

  footer{ border-top:1px solid var(--line); padding: 26px 0 40px; font-family:'IBM Plex Mono', monospace; font-size:0.78rem; color: var(--text-dim); display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }

function renderProduct(){
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var main = document.getElementById('mainContent');
  var p = products[id];

  if(!p){
    main.innerHTML = '<div class="not-found"><p>محصول مورد نظر پیدا نشد.</p><a class="btn-primary" href="index.html" style="display:inline-block;margin-top:16px;">بازگشت به خانه</a></div>';
    return;
  }

  document.title = p.name + ' | موبایل آسیا';

  var mediaHtml = p.img
    ? '<img src="' + p.img + '" alt="' + p.name + '">'
    : '<svg class="icon" viewBox="0 0 24 24"><use href="#icon-phone"/></svg>';

  var specsHtml = '';
  for(var key in p.specs){
    specsHtml += '<div class="specs-row"><div class="k">' + key + '</div><div class="v">' + p.specs[key] + '</div></div>';
  }

  main.innerHTML =
    '<a class="back-link" href="' + p.backUrl + '">← بازگشت به لیست</a>' +
    '<div class="product-top">' +
      '<div class="product-media"><div class="frame">' + mediaHtml + '</div></div>' +
      '<div class="product-info">' +
        '<span class="cat">' + p.cat + '</span>' +
        '<h1>' + p.name + '</h1>' +
        '<div class="price-tag">قیمت روز: تماس بگیرید</div>' +
        '<div class="actions">' +
          '<a class="btn-primary" href="tel:+989916090254">تماس برای قیمت</a>' +
          '<a class="btn-ghost" href="' + p.backUrl + '">مشاهده مدل‌های مشابه</a>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="specs-section">' +
      '<h2>مشخصات فنی</h2>' +
      '<div class="specs-table">' + specsHtml + '</div>' +
    '</div>';
}

renderProduct();
